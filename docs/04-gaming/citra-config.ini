; Citra MMJ - configurazione ottimizzata per Sony Xperia 1 III (Snapdragon 888) su LineageOS 22.2.
; Ripresa verbatim dalla sezione gaming "Pacchetto completo".
; Posizione sul dispositivo (Citra MMJ recenti usano la root interna, non Android/data):
;   /citra-emu/config/config.ini
; Vedi RUNBOOK.md di questa cartella per il deployment.

[Layout]
SecondScreenLayout=0
SwapScreens=false

[Renderer]
UseHwRenderer=true
UseShaderJit=true
ResolutionFactor=3
LinearFiltering=true
AccurateMultiplication=false
EnableHardwareShader=true
ShaderDiskCache=true

[Audio]
EnableAudioStretching=false

[System]
RegionValue=-1
EnableCpuJit=true
